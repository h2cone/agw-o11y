data_dir: /var/lib/vector

sources:
  otlp_in:
    type: opentelemetry
    use_otlp_decoding: true
    grpc:
      address: 0.0.0.0:4317
    http:
      address: 0.0.0.0:4318

  agentgateway_metrics:
    type: prometheus_scrape
    endpoints:
      - http://agentgateway:15020/metrics
    scrape_interval_secs: 15

sinks:
  victoria_logs:
    type: opentelemetry
    inputs:
      - otlp_in.logs
    protocol:
      type: http
      uri: http://victoria-logs:9428/insert/opentelemetry/v1/logs
      encoding:
        codec: otlp

  victoria_metrics:
    type: prometheus_remote_write
    inputs:
      - agentgateway_metrics
    endpoint: http://victoria-metrics:8428/api/v1/write
    healthcheck:
      enabled: false

  victoria_traces:
    type: opentelemetry
    inputs:
      - otlp_in.traces
    protocol:
      type: http
      uri: http://victoria-traces:10428/insert/opentelemetry/v1/traces
      encoding:
        codec: otlp
